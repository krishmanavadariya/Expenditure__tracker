<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="angular.js"></script>
    <script src="taskmodule.js"></script>
</head>
<body ng-app="myapp" ng-controller="myctrl">
    <center>
        <h1 style="background-color: black;color: aliceblue;">Task Details</h1>
        <table border="3">
            <tr>
                <th>Task ID</th>
                <th>Name</th>
                <th>delete</th>
                <th>update</th>
            </tr>
            <tr ng-repeat="task in tasks">
                <td>{{task.id}}</td>
                <td>{{task.name}}</td>
                <td><button ng-click="deleteTask(task.id)">Delete</button></td>
                <td><a href="update.html?id={{task.id}}">Update</a></td>
            </tr>
        </table>

        <h1 style="background-color: black;color: aliceblue;">New Add Task</h1>
        <table border="3">
            <tr>
                <td>Name : </td>
                <td><input type="text" ng-model="name"></td>
            </tr>
            <tr>
                <td><button type="submit" ng-click="addTask()">Add Task</button></td>
            </tr>
        </table>
    </center>
</body>
</html>
