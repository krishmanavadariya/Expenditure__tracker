<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="homeModule.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f4f8;
        }

        h2 {
            text-align: center;
            color: #333;
            margin: 20px 0;
        }

        form {
            width: 30%;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        td {
            padding: 10px;
            text-align: left;
            vertical-align: middle;
        }

        input[type="email"],
        input[type="password"] {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }

        input[type="submit"] {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #0056b3;
        }

        a {
            text-decoration: none;
            color: #007BFF;
            font-size: 14px;
            font-weight: bold;
        }

        a:hover {
            color: #0056b3;
        }

        td:nth-child(1) {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <h2>Login</h2>
    <form ng-app="homeApp" ng-controller="homeController">
        <table border="0" align="center">
            <tr>
                <td>Email</td>
                <td><input type="email" name="em" ng-model="email"></td>
            </tr>
            <tr>
                <td>Password</td>
                <td><input type="password" name="ps" ng-model="password"></td>
            </tr>
            <tr>
                <td><a href="register.html">Sign Up</a></td>
                <td><input type="submit" value="Login" name="submit" ng-click="login(email,password)"></td>
            </tr>
        </table>
    </form>
</body>
</html>
