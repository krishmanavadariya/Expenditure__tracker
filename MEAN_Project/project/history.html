<!DOCTYPE html>
<html lang="en" ng-app="expenditureApp" ng-controller="expenditureController">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style.css">
    <script src="calculation.js"></script>
    <style>
        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px auto;
            background-color: #f9f9f9;
        }

        .history-table th, .history-table td {
            border: 1px solid #ddd;
            text-align: center;
            padding: 10px;
        }

        .history-table th {
            background-color: #2E3B4E;
            color: white;
        }

        .history-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <header>
        <nav class="navbar">
            <h1 style="color: aliceblue;">Expenditure Tracker</h1>
            <ul>
                <li><a href="HomePage.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="features.html">Back</a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1>Expense History</h1>
        <table border="1" class="history-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Description</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="record in history">
                    <td>{{ record.date }}</td>
                    <td>{{ record.time }}</td>
                    <td>{{ record.description }}</td>
                    <td>{{ record.amount }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
