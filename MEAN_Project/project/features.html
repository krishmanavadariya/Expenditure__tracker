<!DOCTYPE html>
<html lang="en" ng-app="expenditureApp" ng-controller="expenditureController">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Features</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style.css">
    <script src="calculation.js"></script>
    <script>
        // Check session status on page load
        document.addEventListener('DOMContentLoaded', function() {
            fetch('/api/session')
                .then(response => {
                    if (!response.ok) {
                        // If session is invalid, redirect to login.html
                        window.location.href = 'login.html';
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.isAuthenticated) {
                        console.log(`Welcome back, ${data.email}!`);
                    }
                })
                .catch(error => {
                    console.error('Error checking session:', error);
                    window.location.href = 'login.html'; // Redirect to login.html if error occurs
                });
        });
    </script>
</head>
<body>  
    <header>
        <nav class="navbar">
            <h1 style="color: aliceblue;">Expenditure Tracker</h1>
            <ul>
                <li><a href="HomePage.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="history.html">History</a></li>
            </ul>
        </nav>
    </header>
           
    <div class="container">
        <h1>Expenditure Calculator</h1>
      
        <form>
          <label for="income">Enter Income:</label>
          <input type="number" id="income" ng-model="income" name="income" required/>
      
          <label for="expense">Enter Expense:</label>
          <input type="number" id="expense" ng-model="expense" name="expense" required/>

          <label for="description">Description:</label>
          <input type="text" id="description" ng-model="description" name="description" required/>
      
          <button type="button" ng-click="insert()">Add Expense</button>
        </form>
      
        <div class="result">
          <h2>Summary</h2>
          <p><strong>Total Income:</strong> {{ income || 0 }}</p>
          <p><strong>Total Expenditure:</strong> {{ totalExpenditure }}</p>
          <p><strong>Balance:</strong> {{ balance }}</p>
        </div>
      </div>
</body>
</html>
